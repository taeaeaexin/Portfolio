<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio_Taesin</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- AWS Amplify CDN 추가 -->
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@3.3.27/dist/aws-amplify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aws-amplify@3.3.27/dist/aws-amplify-api.min.js"></script>
    <script src="aws-exports.js"></script>
    <script src="mutations.js"></script>
    <script src="queries.js"></script>
    <script src="assets/js/app.js" defer></script>
</head>
<body>
<header>
    <div class="header-container">
        <h1>Full Stack Developer</h1>
        <nav>
            <ul>
                <li><a href="#about">소개</a></li>
                <li><a href="#projects">프로젝트</a></li>
                <li><a href="#guestbook">방명록 작성</a></li>
                <li><a href="#guestbook-view">방명록 보기</a></li>
            </ul>
        </nav>
    </div>
</header>
<main>
    <section id="about" class="center">
        <img src="https://via.placeholder.com/150" alt="프로필 사진" class="profile-photo">
        <div class="profile-info">
            <h2>문태신</h2>
            <p>1999.01.07</p>
            <p>헬스와 코딩, 고양이를 좋아해요.</p>
        </div>
    </section>
    <section id="projects">
        <h2>프로젝트</h2>
        <div id="project-list">
            <!-- JavaScript로 프로젝트 여따가 추가 -->
        </div>
    </section>
    <section id="guestbook">
        <h2>방명록</h2>
        <div class="guestbook-container">
            <div class="guestbook-form-container">
                <form id="guestbook-form">
                    <input type="text" id="guest-name" placeholder="이름" required>
                    <textarea id="guest-message" placeholder="메시지" required></textarea>
                    <button type="submit">등록</button>
                </form>
            </div>
            <div class="guestbook-entries-container">
                <div id="guestbook-entries" class="scrollable">
                    <!-- JavaScript로 방명록 항목이 여기에 추가될 것입니다 -->
                </div>
            </div>
        </div>
    </section>
</main>
<hr>
<footer>
    <small>Ver 1.1.0 (Update 240626 17:37) | 배고픈 개발자에게 후원하기 (KB국민945802-00-462066)</small>
</footer>
</body>
</html>
