<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio_Taesin</title>
    <link rel="stylesheet" href="styles.css"> <!-- CSS 연결 -->
</head>
<body>
<header>
    <div class="header-container">
        <h1>Full Stack Developer </h1>
        <nav>
            <ul>
                <li><a href="#about">소개</a></li>
                <li><a href="#projects">프로젝트</a></li>
                <li><a href="#guestbook">방명록 작성</a></li>
                <li><a href="#guestbook-view">방명록 보기</a></li>
            </ul>
        </nav>
    </div>
</header>
<main>
    <section id="about" class="center">
        <img src="https://via.placeholder.com/150" alt="프로필 사진" class="profile-photo">
        <div class="profile-info">
            <h2>문태신</h2>
            <p>1999.01.07</p>
            <p>헬스와 코딩, 고양이를 좋아해요.</p>
        </div>
    </section>
    <section id="projects">
        <h2>프로젝트</h2>
        <div id="project-list">
            <!-- JavaScript로 프로젝트 여따가 추가 -->
        </div>
    </section>
    <section id="guestbook">
        <h2>방명록 작성</h2>
        <form id="guestbook-form">
            <input type="text" id="guest-name" placeholder="이름" required>
            <textarea id="guest-message" placeholder="메시지" required></textarea>
            <button type="submit">등록</button>
        </form>
    </section>
    <section id="guestbook-view">
        <h2>방명록 보기</h2>
        <div id="guestbook-entries" class="scrollable">
            <!-- 방명록 추가부분 -->
        </div>
    </section>
</main>
<hr>
<footer>
    <small>Ver 1.0.2 (Update 240624 17:27) | 배고픈 개발자에게 후원하기 (KB국민945802-00-462066)</small> <!-- 최신 버전 관리 -->
</footer>
<script src="app.js"></script> <!-- JavaScript 파일 연결 -->
</body>
</html>
